services:
  postgres:
    image: postgres:16-alpine
    container_name: cip-postgres
    environment:
      POSTGRES_DB: conversation_db
      POSTGRES_USER: conversation
      POSTGRES_PASSWORD: conversation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conversation -d conversation_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: cip-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cip-backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      APP_ENV: local
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg2://conversation:conversation@postgres:5432/conversation_db
      QDRANT_URL: http://qdrant:6333
      UPLOAD_STORAGE_DIR: /app/storage/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  qdrant_data:
